function loadQ(){
  if(idx>=q.length){analyze();return;}
  var cur=q[idx];
  pf.style.width=((idx+1)/q.length*100)+"%";
  pt.innerHTML="Q. "+(idx+1)+" / "+q.length;
  pp.innerHTML=Math.round((idx+1)/q.length*100)+"%";
  qcat.innerHTML=cn[cur.c];
  qt.innerHTML=(idx+1)+". "+cur.q;
  var g=og;g.innerHTML="";
  for(var j=0;j<cur.o.length;j++){
    var d=document.createElement("div");
    d.className="op";
    d.innerHTML=cur.o[j].t;
    d.setAttribute("data-idx",j);
    d.addEventListener("click",(function(s,ca,i){return function(){pick(s,ca,i);}})(cur.o[j].s,cur.c,j));
    g.appendChild(d);
  }
  if(ans[idx]>=0){
    var opts=g.querySelectorAll(".op");
    if(opts[ans[idx]])opts[ans[idx]].classList.add("op-sel");
  }
  var nb=document.createElement("div");nb.className="nv";
  var prevBtn='<div></div>';
  if(idx>0)prevBtn='<button class="btn btn-sm btn-outline" onclick="prevQ()">← 上一题</button>';
  var canGo=ans[idx]>=0;
  var nextBtn='<button class="btn btn-sm'+(canGo?'" onclick="goNext()">确认 →':' btn-gray" onclick="goNext()">下一题 →')+'</button>';
  nb.innerHTML=prevBtn+nextBtn;g.appendChild(nb);
}

function pick(s,ca,i){
  ans[idx]=i;
  var opts=og.querySelectorAll(".op");
  for(var k=0;k<opts.length;k++){opts[k].classList.remove("op-sel");}
  if(opts[i])opts[i].classList.add("op-sel");
  setTimeout(function(){
    sc[s]++;idx++;
    if(catSc[ca])catSc[ca][s]++;
    loadQ();
  },200);
}

function prevQ(){if(idx>0){idx--;loadQ();}}

function goNext(){
  if(ans[idx]>=0){
    var c=q[idx].c;var s=q[idx].o[ans[idx]].s;
    sc[s]++;idx++;if(catSc[c])catSc[c][s]++;loadQ();

}
